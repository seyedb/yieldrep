data_dir: data
reports_dir: reports

pca:
  n_components: 5
  min_maturities: 3

nelson_siegel:
  tau: 1.5
  min_maturities: 3

targets:
  horizons_days: [1, 5, 20]

evaluation:
  method: date_ordered
  test_fraction: 0.2
  min_train_dates: 252
  test_window_dates: 63
  step_dates: 63
  walk_forward_max_windows: 4
  ridge_alpha: 1.0
  elastic_net_alpha: 0.01
  elastic_net_l1_ratio: 0.5
  non_overlapping_targets: true
  lag_days: [1, 5, 20]

plots:
  selected_maturities: [0.25, 1.0, 2.0, 5.0, 10.0, 30.0]

sources:
  fed_gsw:
    country: US
    source: fed_gsw
    raw_file: data/raw/fed_gsw.csv
    url: https://www.federalreserve.gov/data/yield-curve-tables/feds200628.csv

  bank_of_canada:
    country: CA
    source: bank_of_canada
    raw_file: data/raw/boc_zero_coupon.csv
    url: https://www.bankofcanada.ca/stats/results/csv?lookupPage=lookup_yield_curve.php&startRange=1986-01-01&searchRange=all

  ecb_yield_curve:
    country: EA
    source: ecb_yield_curve
    raw_file: data/raw/ecb_yield_curve.csv
    url: https://data-api.ecb.europa.eu/service/data/YC/B.U2.EUR.4F.G_N_C.SV_C_YM.SR_3M+SR_6M+SR_1Y+SR_2Y+SR_5Y+SR_10Y+SR_30Y?format=csvdata

policy_rates:
  fed_funds:
    country: US
    source: fred_dff
    raw_file: data/raw/policy_dff.csv
    url: https://fred.stlouisfed.org/graph/fredgraph.csv?id=DFF

  boc_target_overnight:
    country: CA
    source: bank_of_canada_policy_rate
    raw_file: data/raw/policy_boc_target_overnight.csv
    url: https://www.bankofcanada.ca/valet/observations/V39079/csv

  ecb_deposit_facility:
    country: EA
    source: ecb_deposit_facility
    raw_file: data/raw/policy_ecb_deposit_facility.csv
    url: https://data-api.ecb.europa.eu/service/data/FM/B.U2.EUR.4F.KR.DFR.LEV?format=csvdata
